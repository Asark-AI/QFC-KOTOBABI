<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QFC KOT Media System - Authentication</title>
  <!-- Google Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <style>
    /* ==========================================================================
       DESIGN SYSTEM & VARIABLES
       ========================================================================== */
    :root {
      --primary: #1e3a8a;
      --primary-light: #3b82f6;
      --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      
      --text-white: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.15);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: "";
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.35) 0%, transparent 70%);
      top: 5%;
      left: 10%;
      z-index: 1;
      filter: blur(50px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
      bottom: 5%;
      right: 10%;
      z-index: 1;
      filter: blur(60px);
    }

    .auth-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 480px;
      padding: 40px;
      box-shadow: var(--shadow-xl);
      z-index: 2;
      animation: fadeIn 0.6s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo {
      font-size: 48px;
      margin-bottom: 12px;
      display: inline-block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
    }

    .auth-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Auth sliding tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 4px;
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .auth-tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .auth-tab-btn:hover {
      color: var(--text-white);
    }

    .auth-tab-btn.active {
      background: var(--primary-gradient);
      color: var(--text-white);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-white);
      outline: none;
      transition: var(--transition);
      font-family: inherit;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--primary-light);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .form-select option {
      background-color: #0f172a;
      color: var(--text-white);
      padding: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-white);
      background: var(--primary-gradient);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(30, 58, 138, 0.3);
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-message {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      animation: slideInDown 0.3s ease;
    }

    .form-message.success {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
      display: block;
    }

    .form-message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }

    .form-message.info {
      background: rgba(6, 182, 212, 0.2);
      color: #22d3ee;
      border: 1px solid rgba(6, 182, 212, 0.3);
      display: block;
    }

    /* Password Requirements indicator */
    .password-requirements {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.05);
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .password-requirements.show {
      display: block;
    }

    .requirement-item {
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .requirement-check {
      display: inline-flex;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
      transition: var(--transition);
    }

    .requirement-check.valid {
      background: #10b981;
      color: white;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid var(--text-white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 24px;
      }
      .form-row {
        grid-template-columns: 1fr;
        gap: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">⛪</div>
      <h1 class="auth-title">QFC KOT Media</h1>
      <p class="auth-subtitle" id="authSubtitle">Sign in to your account</p>
    </div>

    <!-- Sliding Tab Selector -->
    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="tabLogin" onclick="setAuthMode('login')">
        <span class="material-symbols-outlined" style="font-size: 18px;">login</span> Sign In
      </button>
      <button class="auth-tab-btn" id="tabSignup" onclick="setAuthMode('signup')">
        <span class="material-symbols-outlined" style="font-size: 18px;">person_add</span> Sign Up
      </button>
    </div>

    <!-- SIGN IN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div id="loginMessage" class="form-message"></div>

      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <input 
          type="email" 
          id="loginEmail" 
          class="form-input" 
          placeholder="example@qfckotobabi.org"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input 
          type="password" 
          id="loginPassword" 
          class="form-input" 
          placeholder="••••••••"
          required
        >
      </div>

      <button type="submit" class="submit-btn" id="loginSubmitBtn">Sign In</button>
    </form>

    <!-- SIGN UP FORM -->
    <form id="signupForm" onsubmit="handleSignup(event)" style="display: none;">
      <div id="signupMessage" class="form-message"></div>

      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input 
          type="text" 
          id="fullName" 
          class="form-input" 
          placeholder="Emmanuel Asare"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="example@qfckotobabi.org"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter a strong password"
          onfocus="showPasswordRequirements()"
          onblur="hidePasswordRequirements()"
          oninput="checkPasswordStrength()"
        >
        <div id="passwordRequirements" class="password-requirements">
          <div class="requirement-item">
            <span class="requirement-check" id="check-length">✓</span>
            <span>At least 8 characters</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-upper">✓</span>
            <span>At least one uppercase letter</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-number">✓</span>
            <span>At least one number</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          class="form-input" 
          placeholder="Confirm your password"
        >
      </div>

      <div class="form-row" style="margin-bottom: 20px;">
        <div class="form-group">
          <label class="form-label" for="role">Role</label>
          <select id="role" class="form-select">
            <option value="">Select role</option>
            <option value="Admin">Admin</option>
            <option value="Worship Leader">Worship Leader</option>
            <option value="Choir">Choir Member</option>
            <option value="Media Team">Media Team</option>
            <option value="Tech Support">Tech Support</option>
            <option value="Member">Member</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="ministry">Ministry</label>
          <select id="ministry" class="form-select">
            <option value="">Select ministry</option>
            <option value="Worship">Worship</option>
            <option value="Music">Music</option>
            <option value="Media">Media</option>
            <option value="Technical">Technical</option>
            <option value="Children">Children</option>
            <option value="Youth">Youth</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="signupSubmitBtn">Create Account</button>
    </form>
  </div>

  <script>
    const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygFJyz5Mi-3sSpK_GLDZTD0QtLTx6kNiW0N-C_E9-WkH9T6Q0YnO8sdU9sAfC52WDp/exec';

    // ============================================
    // PAGE LOAD SESSION CHECK
    // ============================================
    document.addEventListener("DOMContentLoaded", () => {
      const existingUser = localStorage.getItem("user");
      if (existingUser) {
        try {
          const user = JSON.parse(existingUser);
          if (user.userID) {
            window.location.href = "main.html";
          }
        } catch (err) {
          localStorage.removeItem("user");
        }
      }
    });

    // ============================================
    // MODE SWITCHER (LOGIN / SIGNUP)
    // ============================================
    function setAuthMode(mode) {
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const subtitle = document.getElementById('authSubtitle');

      // Clear previous error messages
      document.getElementById('loginMessage').style.display = 'none';
      document.getElementById('signupMessage').style.display = 'none';

      if (mode === 'login') {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        subtitle.textContent = 'Sign in to your account';
        
        // Remove 'required' from registration fields
        setRequiredFields(signupForm, false);
        setRequiredFields(loginForm, true);
      } else {
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        subtitle.textContent = 'Create your account';

        // Add 'required' to registration fields
        setRequiredFields(loginForm, false);
        setRequiredFields(signupForm, true);
      }
    }

    function setRequiredFields(formElement, isRequired) {
      const inputs = formElement.querySelectorAll('input, select');
      inputs.forEach(el => {
        if (isRequired) {
          el.setAttribute('required', 'required');
        } else {
          el.removeAttribute('required');
        }
      });
    }

    // ============================================
    // LOGIN
    // ============================================
    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const submitBtn = document.getElementById('loginSubmitBtn');

      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Signing In...';
        showFormMessage('loginMessage', 'Connecting to database...', 'info');

        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            function: "login",
            params: [email, password]
          })
        });

        const result = await response.json();

        if (result && result.success) {
          localStorage.setItem("user", JSON.stringify({
            userID: result.userID,
            name: result.name,
            email: result.email,
            role: result.role,
            ministry: result.ministry
          }));
          showFormMessage('loginMessage', 'Sign in successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = "main.html";
          }, 1000);
        } else {
          showFormMessage('loginMessage', result.message || 'Invalid email or password', 'error');
        }
      } catch (error) {
        console.error(error);
        showFormMessage('loginMessage', 'Unable to connect to server. Please check database connection.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    }

    // ============================================
    // SIGNUP
    // ============================================
    async function handleSignup(event) {
      event.preventDefault();
      const submitBtn = document.getElementById("signupSubmitBtn");
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const role = document.getElementById("role").value;
      const ministry = document.getElementById("ministry").value;

      // Validation
      if (!fullName) {
        showFormMessage("signupMessage", "Please enter your full name", "error");
        return;
      }

      if (!email) {
        showFormMessage("signupMessage", "Please enter your email", "error");
        return;
      }

      if (!isValidEmail(email)) {
        showFormMessage("signupMessage", "Invalid email address", "error");
        return;
      }

      if (password.length < 8) {
        showFormMessage("signupMessage", "Password must be at least 8 characters", "error");
        return;
      }

      if (password !== confirmPassword) {
        showFormMessage("signupMessage", "Passwords do not match", "error");
        return;
      }

      if (!role) {
        showFormMessage("signupMessage", "Select a role", "error");
        return;
      }

      if (!ministry) {
        showFormMessage("signupMessage", "Select a ministry", "error");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Creating Account...';
        showFormMessage("signupMessage", "Creating account on server...", "info");

        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({
            function: "registerUser",
            params: [fullName, email, password, role, ministry]
          })
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem("user", JSON.stringify({
            userID: result.userID,
            name: fullName,
            email: email,
            role: role,
            ministry: ministry
          }));

          showFormMessage("signupMessage", "Account created successfully! Loading dashboard...", "success");
          document.getElementById("signupForm").reset();

          setTimeout(() => {
            window.location.href = "main.html";
          }, 1500);
        } else {
          showFormMessage("signupMessage", result.message || result.error || "Registration failed", "error");
        }
      } catch (error) {
        console.error(error);
        showFormMessage("signupMessage", "Unable to connect to server", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }
    }

    // ============================================
    // UTILITIES
    // ============================================
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showFormMessage(id, message, type) {
      const box = document.getElementById(id);
      box.className = "form-message " + type;
      box.textContent = message;
    }

    // ============================================
    // PASSWORD STRENGTH CHECKER
    // ============================================
    function showPasswordRequirements() {
      document.getElementById("passwordRequirements").classList.add("show");
    }

    function hidePasswordRequirements() {
      setTimeout(() => {
        document.getElementById("passwordRequirements").classList.remove("show");
      }, 200);
    }

    function checkPasswordStrength() {
      const password = document.getElementById("password").value;
      updateCheck("check-length", password.length >= 8);
      updateCheck("check-upper", /[A-Z]/.test(password));
      updateCheck("check-number", /\d/.test(password));
    }

    function updateCheck(id, valid) {
      const el = document.getElementById(id);
      if (valid) {
        el.classList.add("valid");
        el.textContent = "✓";
      } else {
        el.classList.remove("valid");
        el.textContent = "";
      }
    }
  </script>
</body>
</html>
