<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QFC KOT Media System - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b5bdb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .signup-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .signup-logo {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .signup-title {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .signup-subtitle {
      font-size: 14px;
      color: #666;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
      color: #333;
      background: white;
    }

    .form-input:focus,
    .form-select:focus {
      outline: none;
      border-color: #1e3a8a;
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .form-input::placeholder {
      color: #aaa;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 13px 20px;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b5bdb 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-message {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .form-message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
      display: block;
    }

    .form-message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }

    .form-message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      color: #aaa;
      font-size: 13px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .login-link a {
      color: #1e3a8a;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .password-requirements {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      padding: 10px;
      background: #f5f7fa;
      border-radius: 6px;
      display: none;
    }

    .password-requirements.show {
      display: block;
    }

    .requirement-item {
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .requirement-check {
      display: inline-flex;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e9ecef;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
    }

    .requirement-check.valid {
      background: #28a745;
      color: white;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #1e3a8a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .signup-container {
        padding: 25px;
      }

      .signup-title {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .signup-logo {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="signup-container">
    <div class="signup-header">
      <div class="signup-logo">⛪</div>
      <h1 class="signup-title">QFC KOT Media System</h1>
      <p class="signup-subtitle">Create your account</p>
    </div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div id="message" class="form-message"></div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input 
          type="text" 
          id="fullName" 
          class="form-input" 
          placeholder="Immaneul Asark"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="example@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter a strong password"
          onfocus="showPasswordRequirements()"
          onblur="hidePasswordRequirements()"
          oninput="checkPasswordStrength()"
          required
        >
        <div id="passwordRequirements" class="password-requirements">
          <div class="requirement-item">
            <span class="requirement-check" id="check-length">✓</span>
            <span>At least 8 characters</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-upper">✓</span>
            <span>At least one uppercase letter</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-number">✓</span>
            <span>At least one number</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          class="form-input" 
          placeholder="Confirm your password"
          required
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="role" class="form-select" required>
            <option value="">Select a role</option>
            <option value="Admin">Admin</option>
            <option value="Worship Leader">Worship Leader</option>
            <option value="Choir">Choir Member</option>
            <option value="Media Team">Media Team</option>
            <option value="Tech Support">Tech Support</option>
            <option value="Member">Member</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Ministry</label>
          <select id="ministry" class="form-select" required>
            <option value="">Select ministry</option>
            <option value="Worship">Worship</option>
            <option value="Music">Music</option>
            <option value="Media">Media</option>
            <option value="Technical">Technical</option>
            <option value="Children">Children</option>
            <option value="Youth">Youth</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <div class="divider">or</div>

    <div class="login-link">
      Already have an account? <a href="#" onclick="redirectToLogin(event)">Sign in here</a>
    </div>
  </div>

  <script>
  const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygFJyz5Mi-3sSpK_GLDZTD0QtLTx6kNiW0N-C_E9-WkH9T6Q0YnO8sdU9sAfC52WDp/exec';

// ============================================
// PAGE LOAD
// ============================================

document.addEventListener("DOMContentLoaded", () => {
const existingUser = localStorage.getItem("user");


if (existingUser) {
    try {
        const user = JSON.parse(existingUser);

        if (user.userID) {
            window.location.href = "index.html";
        }
    } catch (err) {
        localStorage.removeItem("user");
    }
}


});

// ============================================
// SIGNUP
// ============================================

async function handleSignup(event) {
event.preventDefault();


const submitBtn = document.getElementById("submitBtn");

const fullName =
    document.getElementById("fullName").value.trim();

const email =
    document.getElementById("email").value.trim().toLowerCase();

const password =
    document.getElementById("password").value;

const confirmPassword =
    document.getElementById("confirmPassword").value;

const role =
    document.getElementById("role").value;

const ministry =
    document.getElementById("ministry").value;

// Validation

if (!fullName) {
    showMessage("Please enter your full name", "error");
    return;
}

if (!email) {
    showMessage("Please enter your email", "error");
    return;
}

if (!isValidEmail(email)) {
    showMessage("Invalid email address", "error");
    return;
}

if (password.length < 8) {
    showMessage(
        "Password must be at least 8 characters",
        "error"
    );
    return;
}

if (password !== confirmPassword) {
    showMessage(
        "Passwords do not match",
        "error"
    );
    return;
}

if (!role) {
    showMessage("Select a role", "error");
    return;
}

if (!ministry) {
    showMessage("Select a ministry", "error");
    return;
}

try {

    submitBtn.disabled = true;
    submitBtn.textContent = "Creating Account...";

    showMessage("Creating account...", "info");

    const response = await fetch(
        GOOGLE_APPS_SCRIPT_URL,
        {
            method: "POST",
            body: JSON.stringify({
                function: "registerUser",
                params: [
                    fullName,
                    email,
                    password,
                    role,
                    ministry
                ]
            })
        }
    );

    const result = await response.json();

    console.log("Server Response:", result);

    if (result.success) {

        localStorage.setItem(
            "user",
            JSON.stringify({
                userID: result.userID,
                name: fullName,
                email: email,
                role: role,
                ministry: ministry
            })
        );

        showMessage(
            "Account created successfully!",
            "success"
        );

        document.getElementById("signupForm").reset();

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);

    } else {

        showMessage(
            result.message ||
            result.error ||
            "Registration failed",
            "error"
        );

    }

} catch (error) {

    console.error(error);

    showMessage(
        "Unable to connect to server",
        "error"
    );

} finally {

    submitBtn.disabled = false;
    submitBtn.textContent = "Create Account";

}


}

// ============================================
// EMAIL VALIDATION
// ============================================

function isValidEmail(email) {
return /^[^\s@]+@[^\s@]+.[^\s@]+$/.test(email);
}

// ============================================
// MESSAGE BOX
// ============================================

function showMessage(message, type) {


const box =
    document.getElementById("message");

box.className =
    "form-message " + type;

box.textContent = message;


}

// ============================================
// PASSWORD CHECKER
// ============================================

function showPasswordRequirements() {
document
.getElementById("passwordRequirements")
.classList.add("show");
}

function hidePasswordRequirements() {
setTimeout(() => {
document
.getElementById("passwordRequirements")
.classList.remove("show");
}, 200);
}

function checkPasswordStrength() {


const password =
    document.getElementById("password").value;

updateCheck(
    "check-length",
    password.length >= 8
);

updateCheck(
    "check-upper",
    /[A-Z]/.test(password)
);

updateCheck(
    "check-number",
    /\d/.test(password)
);


}

function updateCheck(id, valid) {


const el =
    document.getElementById(id);

if (valid) {
    el.classList.add("valid");
    el.textContent = "✓";
} else {
    el.classList.remove("valid");
    el.textContent = "";
}


}

// ============================================
// LOGIN LINK
// ============================================

function redirectToLogin(event) {
event.preventDefault();
window.location.href = "index.html";
}



  </script>
</body>
</html>
